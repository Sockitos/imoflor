name: Supabase CI

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for supabase changes
        id: filter
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD | grep -q '^supabase/'; then
            echo "supabase=true" >> $GITHUB_OUTPUT
          else
            echo "supabase=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Database
        run: supabase start

      - name: Lint Database
        run: supabase db lint

  check:
    name: Check
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Database
        run: supabase start

      - name: Check Types
        run: |
          supabase gen types typescript --local > ./src/lib/types/supabase-types.gen.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet ./src/lib/types/supabase-types.gen.ts; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Database
        run: supabase start

      - name: Test Database
        run: supabase test db
